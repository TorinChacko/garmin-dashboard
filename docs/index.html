<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Field Log — Garmin Dashboard</title>
<style>
  :root{
    --bg: #0b0f0d;
    --panel: #111613;
    --line: #232b26;
    --ink: #e9efe7;
    --ink-dim: #8fa093;
    --accent: #b6ff5c;
    --accent-dim: #6b8a3f;
    --red: #ff6a4d;
    --mono: "JetBrains Mono", "SF Mono", ui-monospace, Menlo, monospace;
    --display: "Bebas Neue", "Archivo Black", system-ui, sans-serif;
    --body: "Inter", system-ui, -apple-system, sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);}

  body{
    background-image:
      radial-gradient(circle at 1px 1px, rgba(255,255,255,0.035) 1px, transparent 0);
    background-size: 22px 22px;
  }

  .wrap{max-width:1080px;margin:0 auto;padding:28px 20px 80px;}

  header{
    display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:1px solid var(--line);
    padding-bottom:18px;margin-bottom:28px;flex-wrap:wrap;gap:12px;
  }
  .brand{font-family:var(--display);font-size:42px;letter-spacing:0.5px;line-height:1;color:var(--accent);}
  .brand small{display:block;font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--ink-dim);text-transform:uppercase;margin-top:6px;}
  .status{font-family:var(--mono);font-size:12px;color:var(--ink-dim);text-align:right;}
  .status .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-right:6px;box-shadow:0 0 8px var(--accent);}

  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
  @media (max-width:760px){.grid{grid-template-columns:repeat(2,1fr);}}

  .stat{
    background:var(--panel);border:1px solid var(--line);border-radius:4px;
    padding:16px 16px 14px;position:relative;overflow:hidden;
  }
  .stat::before{
    content:"";position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent-dim);
  }
  .stat .label{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-dim);}
  .stat .value{font-family:var(--display);font-size:34px;margin-top:6px;line-height:1;}
  .stat .value span{font-size:16px;color:var(--ink-dim);font-family:var(--mono);margin-left:4px;}
  .stat .delta{font-family:var(--mono);font-size:11px;margin-top:6px;}
  .delta.up{color:var(--accent);}
  .delta.down{color:var(--red);}

  .panel{
    background:var(--panel);border:1px solid var(--line);border-radius:4px;
    padding:20px;margin-bottom:20px;
  }
  .panel h2{
    font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;
    color:var(--ink-dim);margin:0 0 16px;display:flex;justify-content:space-between;
  }
  .panel h2 .range{color:var(--accent-dim);}

  svg{width:100%;display:block;overflow:visible;}
  .gridline{stroke:var(--line);stroke-width:1;}
  .series-line{fill:none;stroke:var(--accent);stroke-width:2;}
  .series-area{fill:url(#fadeGrad);opacity:0.5;}
  .axis-label{font-family:var(--mono);font-size:9px;fill:var(--ink-dim);}
  .pt{fill:var(--accent);}
  .pt-empty{fill:transparent;}
  .bar{fill:var(--accent-dim);}
  .bar:hover{fill:var(--accent);}
  .bar-label{font-family:var(--mono);font-size:10px;fill:var(--ink-dim);text-anchor:middle;}
  .bar-value{font-family:var(--mono);font-size:10px;fill:var(--ink);text-anchor:middle;}

  .tag{
    display:inline-block;font-family:var(--mono);font-size:9px;letter-spacing:1px;
    text-transform:uppercase;padding:2px 6px;border-radius:3px;
    background:rgba(182,255,92,0.12);color:var(--accent);border:1px solid var(--accent-dim);
  }

  .row2{display:grid;grid-template-columns:1.3fr 1fr;gap:20px;}
  @media (max-width:760px){.row2{grid-template-columns:1fr;}}

  table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;}
  th{text-align:left;color:var(--ink-dim);font-weight:400;letter-spacing:1px;text-transform:uppercase;font-size:10px;padding:6px 8px;border-bottom:1px solid var(--line);}
  td{padding:7px 8px;border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}

  .empty{
    text-align:center;padding:60px 20px;color:var(--ink-dim);font-family:var(--mono);font-size:13px;
    border:1px dashed var(--line);border-radius:4px;
  }
  .empty strong{color:var(--accent);display:block;font-family:var(--display);font-size:20px;margin-bottom:8px;letter-spacing:1px;}

  footer{font-family:var(--mono);font-size:10px;color:var(--ink-dim);text-align:center;margin-top:40px;letter-spacing:1px;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">FIELD LOG<small>garmin connect / personal telemetry</small></div>
    <div class="status" id="statusLine"><span class="dot"></span>loading…</div>
  </header>

  <div id="content">
    <div class="empty">
      <strong>NO DATA YET</strong>
      Waiting on the first run of the Fetch Garmin Data action.<br/>
      Trigger it manually from the repo's Actions tab, or wait for the daily schedule.
    </div>
  </div>

  <footer>DATA REFRESHES DAILY VIA GITHUB ACTIONS — SOURCE: data/history.json</footer>
</div>

<script>
async function main(){
  const statusEl = document.getElementById('statusLine');
  const contentEl = document.getElementById('content');

  let raw, activitiesRaw;
  try {
    const [histRes, actRes] = await Promise.all([
      fetch('./data/history.json', {cache: "no-store"}),
      fetch('./data/activities.json', {cache: "no-store"}).catch(() => null),
    ]);
    raw = await histRes.json();
    activitiesRaw = actRes ? await actRes.json().catch(() => ({})) : {};
  } catch (e) {
    statusEl.innerHTML = '<span class="dot" style="background:#ff6a4d;box-shadow:0 0 8px #ff6a4d"></span>failed to load data';
    return;
  }

  const days = Object.keys(raw).sort();
  if (days.length === 0) {
    statusEl.innerHTML = '<span class="dot"></span>no data yet';
    return;
  }

  const rows = days.map(d => raw[d]);
  const last = rows[rows.length - 1];
  const prev = rows.length > 1 ? rows[rows.length - 2] : null;

  statusEl.innerHTML = `<span class="dot"></span>last synced ${last.date}`;

  const fmt = (v, unit='') => (v === null || v === undefined) ? '—' : `${Math.round(v).toLocaleString()}${unit ? ` <span>${unit}</span>` : ''}`;
  const delta = (a,b) => {
    if (a===null||a===undefined||b===null||b===undefined) return '';
    const d = a-b;
    if (d===0) return '';
    const cls = d>0 ? 'up':'down';
    const sign = d>0 ? '+':'';
    return `<div class="delta ${cls}">${sign}${Math.round(d).toLocaleString()} vs prior day</div>`;
  };

  function sparkline(values, opts={}){
    const w = 1000, h = opts.h || 140, pad = 24;
    const nums = values.map(v => v===null||v===undefined ? null : v);
    const valid = nums.filter(v => v!==null);
    if (valid.length === 0) return '<div style="color:var(--ink-dim);font-family:var(--mono);font-size:12px;">no data</div>';
    const max = Math.max(...valid) * 1.1 || 1;
    const min = 0;
    const stepX = (w - pad*2) / Math.max(nums.length - 1, 1);

    const points = nums.map((v,i) => {
      const x = pad + i*stepX;
      if (v===null) return null;
      const y = h - pad - ((v-min)/(max-min||1)) * (h - pad*2);
      return [x,y];
    });

    const validPoints = points.filter(p=>p!==null);
    const pathD = validPoints.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
    const areaD = pathD + ` L ${validPoints[validPoints.length-1][0].toFixed(1)} ${h-pad} L ${validPoints[0][0].toFixed(1)} ${h-pad} Z`;

    const gridLines = [0,0.25,0.5,0.75,1].map(f => {
      const y = pad + f*(h-pad*2);
      return `<line class="gridline" x1="${pad}" y1="${y}" x2="${w-pad}" y2="${y}" />`;
    }).join('');

    const dots = points.map((p,i) => p ? `<circle class="pt" cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3"/>` : '').join('');

    return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="fadeGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#b6ff5c" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#b6ff5c" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${gridLines}
      <path class="series-area" d="${areaD}" />
      <path class="series-line" d="${pathD}" />
      ${dots}
    </svg>`;
  }

  function barChart(labels, values, opts={}){
    const w = 1000, h = opts.h || 160, pad = 28;
    const valid = values.filter(v => v !== null && v !== undefined);
    if (valid.length === 0) return '<div style="color:var(--ink-dim);font-family:var(--mono);font-size:12px;">no data</div>';
    const max = Math.max(...valid) * 1.15 || 1;
    const n = values.length;
    const slot = (w - pad*2) / n;
    const barW = Math.min(slot * 0.55, 46);

    const gridLines = [0,0.25,0.5,0.75,1].map(f => {
      const y = pad + f*(h - pad*2 - 18);
      return `<line class="gridline" x1="${pad}" y1="${y}" x2="${w-pad}" y2="${y}" />`;
    }).join('');

    const bars = values.map((v,i) => {
      const cx = pad + slot*i + slot/2;
      if (v === null || v === undefined) return '';
      const barH = (v/max) * (h - pad*2 - 18);
      const y = (h - pad - 18) - barH;
      return `
        <rect class="bar" x="${(cx-barW/2).toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${barH.toFixed(1)}" rx="2"/>
        <text class="bar-value" x="${cx.toFixed(1)}" y="${(y-6).toFixed(1)}">${v.toFixed(1)}</text>
        <text class="bar-label" x="${cx.toFixed(1)}" y="${h-pad+10}">${labels[i]}</text>
      `;
    }).join('');

    return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      ${gridLines}
      ${bars}
    </svg>`;
  }

  // ISO week key, e.g. "2026-W26", and a friendly short label like "Jun 22"
  function isoWeekInfo(dateStr){
    const d = new Date(dateStr + 'T00:00:00');
    const target = new Date(d.valueOf());
    const dayNr = (d.getDay() + 6) % 7;
    target.setDate(target.getDate() - dayNr + 3);
    const firstThursday = target.valueOf();
    target.setMonth(0,1);
    if (target.getDay() !== 4) {
      target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
    }
    const weekNum = 1 + Math.round((firstThursday - target.valueOf()) / (7*24*3600*1000));

    // Monday of this ISO week, for a friendly label
    const monday = new Date(d.valueOf());
    monday.setDate(d.getDate() - dayNr);
    const label = monday.toLocaleDateString('en-US', {month:'short', day:'numeric'});

    return { key: `${d.getFullYear()}-W${String(weekNum).padStart(2,'0')}`, label, monday };
  }

  function aggregateWeeklyMileage(rows){
    const weeks = {};
    for (const r of rows) {
      if (r.distance_km === null || r.distance_km === undefined) continue;
      const { key, label, monday } = isoWeekInfo(r.date);
      if (!weeks[key]) weeks[key] = { label, monday, total: 0 };
      weeks[key].total += r.distance_km;
    }
    return Object.entries(weeks)
      .sort((a,b) => a[1].monday - b[1].monday)
      .map(([key, w]) => ({ key, label: w.label, total: w.total }));
  }

  function aggregateWeeklyRunning(activities){
    const weeks = {};
    for (const a of activities) {
      if (!a.start_local || !a.type) continue;
      if (!a.type.toLowerCase().includes('run')) continue;
      const dateOnly = a.start_local.split(' ')[0].split('T')[0];
      const { key, label, monday } = isoWeekInfo(dateOnly);
      if (!weeks[key]) weeks[key] = { label, monday, distance: 0, maxHr: null, paces: [], count: 0 };
      const w = weeks[key];
      if (a.distance_km) w.distance += a.distance_km;
      if (a.max_hr) w.maxHr = w.maxHr === null ? a.max_hr : Math.max(w.maxHr, a.max_hr);
      if (a.pace_min_per_km) w.paces.push(a.pace_min_per_km);
      w.count += 1;
    }
    return Object.entries(weeks)
      .sort((a,b) => b[1].monday - a[1].monday)
      .map(([key, w]) => ({
        key, label: w.label, count: w.count,
        distance: w.distance,
        maxHr: w.maxHr,
        avgPace: w.paces.length ? w.paces.reduce((s,p)=>s+p,0)/w.paces.length : null,
      }));
  }

  function formatPace(minPerKm){
    if (!minPerKm) return '—';
    const min = Math.floor(minPerKm);
    const sec = Math.round((minPerKm - min) * 60);
    return `${min}:${String(sec).padStart(2,'0')}/km`;
  }

  function formatDuration(seconds){
    if (!seconds) return '—';
    const h = Math.floor(seconds/3600);
    const m = Math.round((seconds%3600)/60);
    return h > 0 ? `${h}h ${m}m` : `${m}m`;
  }


  // last 30 days for charts
  const windowRows = rows.slice(-30);
  const labelStart = windowRows[0]?.date || '';
  const labelEnd = windowRows[windowRows.length-1]?.date || '';

  // activities: object keyed by activity_id -> array, newest first
  const activities = Object.values(activitiesRaw || {}).sort((a,b) =>
    (b.start_local || '').localeCompare(a.start_local || ''));

  const weeklyMileage = aggregateWeeklyMileage(rows).slice(-12); // last 12 weeks
  const weeklyRunning = aggregateWeeklyRunning(activities).slice(0, 8); // most recent 8 weeks

  // VO2 max / training readiness — use whichever rows have values
  const vo2Rows = rows.filter(r => r.vo2max_running !== null && r.vo2max_running !== undefined);
  const readinessRows = windowRows.filter(r => r.training_readiness !== null && r.training_readiness !== undefined);
  const latestVo2 = vo2Rows.length ? vo2Rows[vo2Rows.length-1] : null;

  // --- Acute:Chronic Workload Ratio (ACWR) ---
  // Uses daily distance as a proxy for training load.
  // Acute = 7-day avg, Chronic = 28-day avg. Ratio >1.5 = overreach risk.
  function computeACWR(rows) {
    const results = [];
    for (let i = 27; i < rows.length; i++) {
      const acute7 = rows.slice(i-6, i+1).map(r => r.distance_km || 0);
      const chronic28 = rows.slice(i-27, i+1).map(r => r.distance_km || 0);
      const acuteAvg = acute7.reduce((s,v)=>s+v,0) / 7;
      const chronicAvg = chronic28.reduce((s,v)=>s+v,0) / 28;
      const ratio = chronicAvg > 0 ? acuteAvg / chronicAvg : null;
      results.push({ date: rows[i].date, ratio: ratio ? Math.round(ratio * 100) / 100 : null });
    }
    return results;
  }
  const acwrData = computeACWR(rows);
  const acwrWindow = acwrData.slice(-30);
  const latestACWR = acwrData.length ? acwrData[acwrData.length-1].ratio : null;
  const acwrStatus = latestACWR === null ? '—'
    : latestACWR > 1.5 ? '⚠ HIGH RISK'
    : latestACWR > 1.3 ? '△ CAUTION'
    : latestACWR >= 0.8 ? '✓ OPTIMAL'
    : '↓ UNDERLOAD';
  const acwrColor = latestACWR === null ? 'var(--ink-dim)'
    : latestACWR > 1.5 ? 'var(--red)'
    : latestACWR > 1.3 ? '#ffb347'
    : 'var(--accent)';

  // --- RHR 7-day rolling average ---
  function rollingAvg(rows, field, window) {
    return rows.map((r, i) => {
      const slice = rows.slice(Math.max(0, i-window+1), i+1).map(x => x[field]).filter(v => v !== null && v !== undefined);
      return slice.length ? slice.reduce((s,v)=>s+v,0)/slice.length : null;
    });
  }
  const rhrValues = windowRows.map(r => r.resting_hr);
  const rhrRolling = rollingAvg(windowRows, 'resting_hr', 7);

  // --- Pace vs HR Efficiency (runs only, over time) ---
  function paceHrEfficiency(activities) {
    return activities
      .filter(a => a.type && a.type.toLowerCase().includes('run') && a.avg_hr && a.pace_min_per_km && a.distance_km > 1)
      .slice(0, 60)
      .reverse()
      .map(a => ({
        date: (a.start_local || '').split('T')[0].split(' ')[0],
        pace: a.pace_min_per_km,
        hr: a.avg_hr,
        // Efficiency index: lower pace (faster) at lower HR = higher score
        // Normalised as (1/pace) / hr * 1000 for readability
        efficiency: Math.round((1 / a.pace_min_per_km) / a.avg_hr * 10000) / 10,
      }));
  }
  const paceHrData = paceHrEfficiency(activities);

  // --- Longest run + elevation per week ---
  function aggregateWeeklyRunningFull(activities) {
    const weeks = {};
    for (const a of activities) {
      if (!a.start_local || !a.type) continue;
      if (!a.type.toLowerCase().includes('run')) continue;
      const dateOnly = a.start_local.split(' ')[0].split('T')[0];
      const { key, label, monday } = isoWeekInfo(dateOnly);
      if (!weeks[key]) weeks[key] = { label, monday, distance: 0, maxHr: null, paces: [], count: 0, longestRun: 0, elevationGain: 0 };
      const w = weeks[key];
      if (a.distance_km) { w.distance += a.distance_km; w.longestRun = Math.max(w.longestRun, a.distance_km); }
      if (a.max_hr) w.maxHr = w.maxHr === null ? a.max_hr : Math.max(w.maxHr, a.max_hr);
      if (a.pace_min_per_km) w.paces.push(a.pace_min_per_km);
      if (a.elevation_gain_m) w.elevationGain += a.elevation_gain_m;
      w.count += 1;
    }
    return Object.entries(weeks)
      .sort((a,b) => b[1].monday - a[1].monday)
      .map(([key, w]) => ({
        key, label: w.label, count: w.count,
        distance: w.distance,
        longestRun: w.longestRun,
        elevationGain: w.elevationGain,
        maxHr: w.maxHr,
        avgPace: w.paces.length ? w.paces.reduce((s,p)=>s+p,0)/w.paces.length : null,
      }));
  }
  const weeklyRunningFull = aggregateWeeklyRunningFull(activities).slice(0, 12);

  // dual-line sparkline (two series, second dashed)
  function sparklineDual(values1, values2, opts={}) {
    const w = 1000, h = opts.h || 140, pad = 24;
    const allValid = [...values1, ...values2].filter(v => v !== null && v !== undefined);
    if (allValid.length === 0) return '<div style="color:var(--ink-dim);font-family:var(--mono);font-size:12px;">no data</div>';
    const max = Math.max(...allValid) * 1.1 || 1;
    const min = Math.min(...allValid) * 0.9;
    const stepX = (w - pad*2) / Math.max(values1.length - 1, 1);

    function toPoints(vals) {
      return vals.map((v,i) => {
        if (v === null || v === undefined) return null;
        const x = pad + i * stepX;
        const y = h - pad - ((v - min) / (max - min || 1)) * (h - pad*2);
        return [x, y];
      });
    }
    function toPath(points) {
      const valid = points.filter(p=>p);
      if (!valid.length) return '';
      return valid.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
    }

    const pts1 = toPoints(values1);
    const pts2 = toPoints(values2);
    const gridLines = [0,0.25,0.5,0.75,1].map(f => {
      const y = pad + f*(h-pad*2);
      return `<line class="gridline" x1="${pad}" y1="${y}" x2="${w-pad}" y2="${y}" />`;
    }).join('');
    const dots1 = pts1.map(p => p ? `<circle fill="var(--accent)" r="3" cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}"/>` : '').join('');
    const dots2 = pts2.map(p => p ? `<circle fill="#ff6a4d" r="3" cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}"/>` : '').join('');

    return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="fadeGrad2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#b6ff5c" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#b6ff5c" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${gridLines}
      <path fill="none" stroke="var(--accent)" stroke-width="2" d="${toPath(pts1)}" />
      <path fill="none" stroke="#ff6a4d" stroke-width="1.5" stroke-dasharray="6 3" d="${toPath(pts2)}" />
      ${dots1}${dots2}
    </svg>
    <div style="font-family:var(--mono);font-size:10px;color:var(--ink-dim);margin-top:8px;">
      <span style="color:var(--accent)">●</span> ${opts.label1 || 'series 1'} &nbsp;
      <span style="color:#ff6a4d">- -</span> ${opts.label2 || 'series 2'}
    </div>`;
  }

  contentEl.innerHTML = `
    <div class="grid">
      <div class="stat">
        <div class="label">Steps — today</div>
        <div class="value">${fmt(last.steps)}</div>
        ${prev ? delta(last.steps, prev.steps) : ''}
      </div>
      <div class="stat">
        <div class="label">Resting HR</div>
        <div class="value">${fmt(last.resting_hr, 'bpm')}</div>
        ${prev ? delta(last.resting_hr, prev.resting_hr) : ''}
      </div>
      <div class="stat">
        <div class="label">Sleep</div>
        <div class="value">${last.sleep_seconds ? (last.sleep_seconds/3600).toFixed(1) : '—'}<span>hrs</span></div>
        ${prev && prev.sleep_seconds ? delta(last.sleep_seconds/3600, prev.sleep_seconds/3600) : ''}
      </div>
      <div class="stat">
        <div class="label">Avg Stress</div>
        <div class="value">${fmt(last.avg_stress)}</div>
        ${prev ? delta(last.avg_stress, prev.avg_stress) : ''}
      </div>
      <div class="stat">
        <div class="label">VO2 Max (running)</div>
        <div class="value">${latestVo2 ? fmt(latestVo2.vo2max_running) : '—'}</div>
        ${latestVo2 ? `<div class="delta">as of ${latestVo2.date}</div>` : ''}
      </div>
      <div class="stat">
        <div class="label">Training Readiness</div>
        <div class="value">${fmt(last.training_readiness)}</div>
        ${prev ? delta(last.training_readiness, prev.training_readiness) : ''}
      </div>
      <div class="stat">
        <div class="label">Load Ratio (ACWR)</div>
        <div class="value" style="font-size:28px;color:${acwrColor}">${latestACWR ?? '—'}</div>
        <div class="delta" style="color:${acwrColor}">${acwrStatus}</div>
      </div>
    </div>

    <div class="row2">
      <div class="panel">
        <h2>Daily Steps <span class="range">${labelStart} → ${labelEnd}</span></h2>
        ${sparkline(windowRows.map(r => r.steps))}
      </div>
      <div class="panel">
        <h2>Resting HR + 7-day avg <span class="range">${labelStart} → ${labelEnd}</span></h2>
        ${sparklineDual(rhrValues, rhrRolling, {h:140, label1:'daily RHR', label2:'7-day avg'})}
      </div>
    </div>

    <div class="row2">
      <div class="panel">
        <h2>Sleep (hrs) <span class="range">${labelStart} → ${labelEnd}</span></h2>
        ${sparkline(windowRows.map(r => r.sleep_seconds ? r.sleep_seconds/3600 : null))}
      </div>
      <div class="panel">
        <h2>Recent Days</h2>
        <table>
          <thead><tr><th>Date</th><th>Steps</th><th>RHR</th></tr></thead>
          <tbody>
            ${rows.slice(-8).reverse().map(r => `
              <tr>
                <td>${r.date}</td>
                <td>${r.steps ?? '—'}</td>
                <td>${r.resting_hr ?? '—'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="panel">
      <h2>Weekly Mileage (km) <span class="range">last ${weeklyMileage.length} weeks</span></h2>
      ${weeklyMileage.length
        ? barChart(weeklyMileage.map(w => w.label), weeklyMileage.map(w => w.total), {h:200})
        : '<div style="color:var(--ink-dim);font-family:var(--mono);font-size:12px;">no distance data yet</div>'}
    </div>

    <div class="row2">
      <div class="panel">
        <h2>Acute:Chronic Load Ratio <span class="range">last 30 days</span></h2>
        ${acwrWindow.length ? (() => {
          const ratios = acwrWindow.map(d => d.ratio);
          // draw ACWR sparkline with colour zones
          const w = 1000, h = 160, pad = 24;
          const valid = ratios.filter(v => v !== null);
          if (!valid.length) return '<div style="color:var(--ink-dim);font-family:var(--mono);font-size:12px;">need 28 days of data</div>';
          const max = Math.max(2.0, ...valid) * 1.05;
          const min = 0;
          const stepX = (w - pad*2) / Math.max(ratios.length-1, 1);
          const points = ratios.map((v,i) => {
            if (v===null) return null;
            const x = pad + i*stepX;
            const y = h - pad - ((v-min)/(max-min)) * (h-pad*2);
            return [x,y,v];
          }).filter(Boolean);
          const pathD = points.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
          // zone lines
          const yOptLow  = h - pad - (0.8/max)*(h-pad*2);
          const yOptHigh = h - pad - (1.3/max)*(h-pad*2);
          const yRisk    = h - pad - (1.5/max)*(h-pad*2);
          const dots = points.map(p => {
            const c = p[2]>1.5?'#ff6a4d':p[2]>1.3?'#ffb347':'var(--accent)';
            return `<circle fill="${c}" r="4" cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}"/>`;
          }).join('');
          return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
            <line stroke="rgba(182,255,92,0.2)" stroke-width="1" stroke-dasharray="4 3" x1="${pad}" y1="${yOptLow.toFixed(1)}" x2="${w-pad}" y2="${yOptLow.toFixed(1)}"/>
            <line stroke="rgba(255,179,71,0.3)" stroke-width="1" stroke-dasharray="4 3" x1="${pad}" y1="${yOptHigh.toFixed(1)}" x2="${w-pad}" y2="${yOptHigh.toFixed(1)}"/>
            <line stroke="rgba(255,106,77,0.4)" stroke-width="1" stroke-dasharray="4 3" x1="${pad}" y1="${yRisk.toFixed(1)}" x2="${w-pad}" y2="${yRisk.toFixed(1)}"/>
            <path fill="none" stroke="var(--accent)" stroke-width="2" d="${pathD}"/>
            ${dots}
            <text fill="rgba(182,255,92,0.5)" font-family="monospace" font-size="10" x="${w-pad+4}" y="${yOptLow.toFixed(1)}">0.8</text>
            <text fill="rgba(255,179,71,0.6)" font-family="monospace" font-size="10" x="${w-pad+4}" y="${yOptHigh.toFixed(1)}">1.3</text>
            <text fill="rgba(255,106,77,0.7)" font-family="monospace" font-size="10" x="${w-pad+4}" y="${yRisk.toFixed(1)}">1.5</text>
          </svg>
          <div style="font-family:var(--mono);font-size:10px;color:var(--ink-dim);margin-top:8px;">
            <span style="color:var(--accent)">●</span> 0.8–1.3 optimal &nbsp;
            <span style="color:#ffb347">●</span> 1.3–1.5 caution &nbsp;
            <span style="color:#ff6a4d">●</span> >1.5 overreach risk
          </div>`;
        })() : '<div style="color:var(--ink-dim);font-family:var(--mono);font-size:12px;">need 28 days of data to compute</div>'}
      </div>
      <div class="panel">
        <h2>Training Readiness <span class="range">${labelStart} → ${labelEnd}</span></h2>
        ${readinessRows.length
          ? sparkline(windowRows.map(r => r.training_readiness))
          : '<div style="color:var(--ink-dim);font-family:var(--mono);font-size:12px;">no readiness data yet — will populate after next sync</div>'}
      </div>
    </div>

    <div class="row2">
      <div class="panel">
        <h2>Pace vs HR Efficiency <span class="range">last ${paceHrData.length} runs</span></h2>
        ${paceHrData.length >= 3
          ? sparklineDual(
              paceHrData.map(d => d.pace),
              paceHrData.map(d => d.hr / 20), // scale HR down to same axis for comparison
              {h:160, label1:'pace (min/km)', label2:'avg HR ÷20'}
            )
          : '<div style="color:var(--ink-dim);font-family:var(--mono);font-size:12px;">need activity data — run the backfill workflow</div>'}
        ${paceHrData.length >= 3 ? `
          <div style="font-family:var(--mono);font-size:10px;color:var(--ink-dim);margin-top:6px;">
            Fitness improving = pace line trending DOWN while HR line stays flat or drops.
          </div>` : ''}
      </div>
      <div class="panel">
        <h2>VO2 Max (running) <span class="range">all time</span></h2>
        ${vo2Rows.length
          ? sparkline(vo2Rows.map(r => r.vo2max_running))
          : '<div style="color:var(--ink-dim);font-family:var(--mono);font-size:12px;">no VO2 max data yet — will populate after next sync</div>'}
      </div>
    </div>

    <div class="panel">
      <h2>Weekly Running Stats <span class="range">most recent ${weeklyRunningFull.length} weeks with runs</span></h2>
      ${weeklyRunningFull.length ? `
        <table>
          <thead><tr><th>Week of</th><th>Runs</th><th>Total km</th><th>Longest</th><th>Elev ↑</th><th>Avg Pace</th><th>Max HR</th></tr></thead>
          <tbody>
            ${weeklyRunningFull.map(w => `
              <tr>
                <td>${w.label}</td>
                <td>${w.count}</td>
                <td>${w.distance.toFixed(1)}</td>
                <td>${w.longestRun.toFixed(1)} km</td>
                <td>${w.elevationGain ? Math.round(w.elevationGain) + 'm' : '—'}</td>
                <td>${formatPace(w.avgPace)}</td>
                <td>${w.maxHr ?? '—'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      ` : '<div style="color:var(--ink-dim);font-family:var(--mono);font-size:12px;">no running activities found yet — run the backfill workflow to pull activity history</div>'}
    </div>

    <div class="panel">
      <h2>Recent Activities <span class="range">${activities.length} total stored</span></h2>
      ${activities.length ? `
        <table>
          <thead><tr><th>Date</th><th>Type</th><th>Distance</th><th>Duration</th><th>Pace</th><th>Avg HR</th></tr></thead>
          <tbody>
            ${activities.slice(0, 12).map(a => `
              <tr>
                <td>${(a.start_local || '').split(' ')[0].split('T')[0] || '—'}</td>
                <td><span class="tag">${(a.type || 'unknown').replace(/_/g,' ')}</span></td>
                <td>${a.distance_km ? a.distance_km.toFixed(2) + ' km' : '—'}</td>
                <td>${formatDuration(a.duration_seconds)}</td>
                <td>${a.pace_min_per_km ? formatPace(a.pace_min_per_km) : '—'}</td>
                <td>${a.avg_hr ?? '—'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      ` : '<div style="color:var(--ink-dim);font-family:var(--mono);font-size:12px;">no activities found yet — run the backfill workflow to pull activity history</div>'}
    </div>
  `;
}

main();
</script>
</body>
</html>
