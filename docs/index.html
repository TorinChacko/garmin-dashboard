<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Torin Chacko — Field Log</title>
<style>
:root{
  --bg:#0b0f0d;--panel:#111613;--line:#232b26;
  --ink:#e9efe7;
  --accent:#b6ff5c;--red:#ff6a4d;
  --accent-dim: color-mix(in srgb, var(--accent) 55%, black 45%);
  --ink-dim: color-mix(in srgb, var(--ink) 55%, var(--bg) 45%);
  --z1:#4fc3f7;--z2:#b6ff5c;--z3:#ffb347;--z4:#ff6a4d;--z5:#cc44ff;
  --mono:"JetBrains Mono","SF Mono",ui-monospace,Menlo,monospace;
  --display:"Bebas Neue","Archivo Black",system-ui,sans-serif;
  --body:"Inter",system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);}
body{background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,0.035) 1px,transparent 0);background-size:22px 22px;}

.wrap{max-width:1120px;margin:0 auto;padding:28px 20px 80px;}

/* HEADER */
header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:0;flex-wrap:wrap;gap:12px;}
.brand{font-family:var(--display);font-size:38px;letter-spacing:0.5px;line-height:1;color:var(--accent);}
.brand small{display:block;font-family:var(--mono);font-size:10px;letter-spacing:2.5px;color:var(--ink-dim);text-transform:uppercase;margin-top:5px;}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px;position:relative;}
.status{font-family:var(--mono);font-size:12px;color:var(--ink-dim);}
.status .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-right:6px;box-shadow:0 0 8px var(--accent);}

/* CONTROLS ROW */
.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.btn{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:5px 14px;border-radius:3px;cursor:pointer;border:1px solid var(--accent-dim);background:transparent;color:var(--ink-dim);transition:all .15s;}
.btn:hover,.btn.active{background:var(--accent);color:#0b0f0d;border-color:var(--accent);}
.maxhr-wrap{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--ink-dim);}
.maxhr-wrap input{width:52px;background:var(--panel);border:1px solid var(--line);color:var(--ink);font-family:var(--mono);font-size:12px;padding:4px 6px;border-radius:3px;text-align:center;}
.maxhr-wrap input:focus{outline:none;border-color:var(--accent-dim);}

/* THEME PANEL */
.theme-panel{display:none;position:absolute;top:100%;right:0;margin-top:8px;background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:14px;z-index:20;min-width:220px;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.theme-panel.open{display:block;}
.theme-panel h3{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-dim);margin:0 0 10px;}
.theme-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;}
.theme-row label{font-family:var(--mono);font-size:11px;color:var(--ink-dim);}
.theme-row input[type="color"]{width:32px;height:24px;padding:0;border:1px solid var(--line);border-radius:3px;background:none;cursor:pointer;}
.theme-actions{display:flex;gap:8px;margin-top:10px;}
.theme-actions .btn{flex:1;padding:5px 8px;font-size:10px;}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:28px;margin-top:20px;}
.tab{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:12px 22px;cursor:pointer;color:var(--ink-dim);border-bottom:2px solid transparent;transition:all .15s;}
.tab:hover{color:var(--ink);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
@media(max-width:760px){.grid,.grid-3{grid-template-columns:repeat(2,1fr);}}

/* STAT CARDS */
.stat{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:16px 16px 14px;position:relative;overflow:hidden;}
.stat::before{content:"";position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent-dim);}
.stat.risk-high::before{background:var(--red);}
.stat.risk-caution::before{background:#ffb347;}
.stat.risk-ok::before{background:var(--accent);}
.stat .label{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-dim);}
.stat .value{font-family:var(--display);font-size:34px;margin-top:6px;line-height:1;}
.stat .value span{font-size:16px;color:var(--ink-dim);font-family:var(--mono);margin-left:4px;}
.stat .delta{font-family:var(--mono);font-size:11px;margin-top:6px;}
.delta.up{color:var(--accent);}.delta.down{color:var(--red);}

/* PANELS */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:22px;margin-bottom:20px;}
.panel h2{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-dim);margin:0 0 18px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;}
.panel h2 .range{color:var(--accent-dim);}
.row2{display:grid;grid-template-columns:1.4fr 1fr;gap:20px;}
.row2e{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:760px){.row2,.row2e{grid-template-columns:1fr;}}

/* SVG / CHARTS */
svg{width:100%;display:block;overflow:visible;}
.gridline{stroke:var(--line);stroke-width:1;}
.series-line{fill:none;stroke:var(--accent);stroke-width:2.5;}
.series-area{fill:url(#fadeGrad);opacity:0.45;}
.pt{fill:var(--accent);}
.bar{fill:var(--accent-dim);transition:fill .1s;}
.bar:hover{fill:var(--accent);}
.bar-label{font-family:var(--mono);font-size:10px;fill:var(--ink-dim);text-anchor:middle;}
.bar-value{font-family:var(--mono);font-size:10px;fill:var(--ink);text-anchor:middle;}

/* TABLE */
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;}
th{text-align:left;color:var(--ink-dim);font-weight:400;letter-spacing:1px;text-transform:uppercase;font-size:10px;padding:6px 8px;border-bottom:1px solid var(--line);}
td{padding:8px 8px;border-bottom:1px solid var(--line);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}

/* TAG */
.tag{display:inline-block;font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px;background:rgba(182,255,92,0.12);color:var(--accent);border:1px solid var(--accent-dim);}

/* RISK */
.risk-badge{font-family:var(--mono);font-size:13px;font-weight:700;padding:3px 10px;border-radius:3px;display:inline-block;margin-top:4px;}
.risk-badge.ok{background:rgba(182,255,92,0.15);color:var(--accent);}
.risk-badge.caution{background:rgba(255,179,71,0.15);color:#ffb347;}
.risk-badge.high{background:rgba(255,106,77,0.15);color:var(--red);}

/* ZONE LEGEND */
.zone-legend{display:flex;gap:14px;flex-wrap:wrap;font-family:var(--mono);font-size:10px;color:var(--ink-dim);margin-top:10px;}
.zone-legend span{display:flex;align-items:center;gap:5px;}
.zone-dot{width:9px;height:9px;border-radius:50%;display:inline-block;}

.no-data{color:var(--ink-dim);font-family:var(--mono);font-size:12px;padding:20px 0;}
.empty{text-align:center;padding:60px 20px;color:var(--ink-dim);font-family:var(--mono);font-size:13px;border:1px dashed var(--line);border-radius:4px;}
.empty strong{color:var(--accent);display:block;font-family:var(--display);font-size:20px;margin-bottom:8px;letter-spacing:1px;}
footer{font-family:var(--mono);font-size:10px;color:var(--ink-dim);text-align:center;margin-top:40px;letter-spacing:1px;}
.tab-content{display:none;}.tab-content.active{display:block;}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="brand">TORIN CHACKO<small>field log / garmin telemetry</small></div>
  <div class="header-right">
    <div class="status" id="statusLine"><span class="dot"></span>loading…</div>
    <div class="controls">
      <button class="btn active" id="btnKm" onclick="setUnit('km')">KM</button>
      <button class="btn" id="btnMi" onclick="setUnit('mi')">MI</button>
      <div class="maxhr-wrap">
        MAX HR <input type="number" id="maxHrInput" value="201" min="150" max="220" onchange="render()"/> bpm
      </div>
      <button class="btn" id="btnTheme" onclick="toggleThemePanel()">THEME</button>
    </div>
    <div class="theme-panel" id="themePanel">
      <h3>Color Scheme</h3>
      <div class="theme-row"><label for="theme_bg">Background</label><input type="color" id="theme_bg" oninput="onThemeInputChange()"/></div>
      <div class="theme-row"><label for="theme_panel">Panel</label><input type="color" id="theme_panel" oninput="onThemeInputChange()"/></div>
      <div class="theme-row"><label for="theme_ink">Text</label><input type="color" id="theme_ink" oninput="onThemeInputChange()"/></div>
      <div class="theme-row"><label for="theme_accent">Accent</label><input type="color" id="theme_accent" oninput="onThemeInputChange()"/></div>
      <div class="theme-row"><label for="theme_red">Alert</label><input type="color" id="theme_red" oninput="onThemeInputChange()"/></div>
      <div class="theme-actions">
        <button class="btn" onclick="resetTheme()">Reset</button>
        <button class="btn" onclick="toggleThemePanel()">Done</button>
      </div>
    </div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('overview')">Overview</div>
  <div class="tab" onclick="switchTab('training')">Training</div>
  <div class="tab" onclick="switchTab('health')">Health</div>
  <div class="tab" onclick="switchTab('records')">Records</div>
</div>

<div id="content">
  <div class="empty"><strong>LOADING</strong>Fetching your data…</div>
</div>

<footer>TORIN CHACKO · FIELD LOG · REFRESHES DAILY VIA GITHUB ACTIONS</footer>
</div>

<script>
let globalRows = [], globalActivities = [], globalUnit = 'km';

function setUnit(u){
  globalUnit = u;
  document.getElementById('btnKm').classList.toggle('active', u==='km');
  document.getElementById('btnMi').classList.toggle('active', u==='mi');
  render();
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['overview','training','health','records'][i]===name);
  });
  document.querySelectorAll('.tab-content').forEach(el => {
    el.classList.toggle('active', el.id==='tab-'+name);
  });
}

// ── theme customization ──────────────────────────────────────
const THEME_KEY='fieldlog-theme-v1';
const THEME_VARS=['--bg','--panel','--ink','--accent','--red'];
const DEFAULT_THEME={'--bg':'#0b0f0d','--panel':'#111613','--ink':'#e9efe7','--accent':'#b6ff5c','--red':'#ff6a4d'};

function varInputId(v){ return 'theme_'+v.replace('--',''); }

function applyTheme(theme){
  for(const k of THEME_VARS){
    const val = theme[k] || DEFAULT_THEME[k];
    document.documentElement.style.setProperty(k, val);
    const el = document.getElementById(varInputId(k));
    if(el) el.value = val;
  }
}

function loadTheme(){
  let saved = {};
  try{ saved = JSON.parse(localStorage.getItem(THEME_KEY) || '{}'); }
  catch(e){ saved = {}; }
  applyTheme({...DEFAULT_THEME, ...saved});
}

function onThemeInputChange(){
  const theme = {};
  for(const k of THEME_VARS){
    const el = document.getElementById(varInputId(k));
    if(el) theme[k] = el.value;
  }
  applyTheme(theme);
  try{ localStorage.setItem(THEME_KEY, JSON.stringify(theme)); }catch(e){}
}

function resetTheme(){
  try{ localStorage.removeItem(THEME_KEY); }catch(e){}
  applyTheme(DEFAULT_THEME);
}

function toggleThemePanel(){
  document.getElementById('themePanel').classList.toggle('open');
}

document.addEventListener('click', (e)=>{
  const panel = document.getElementById('themePanel');
  const btn = document.getElementById('btnTheme');
  if(panel.classList.contains('open') && !panel.contains(e.target) && e.target!==btn){
    panel.classList.remove('open');
  }
});

// ── unit helpers ──────────────────────────────────────────────
function distVal(km){ return globalUnit==='mi' ? km*0.621371 : km; }
function distLabel(){ return globalUnit==='mi' ? 'mi' : 'km'; }
function distFmt(km, dec=1){
  if(km===null||km===undefined) return '—';
  return distVal(km).toFixed(dec)+' '+distLabel();
}

// ── chart helpers ─────────────────────────────────────────────
const GRAD = `<defs><linearGradient id="fadeGrad" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#b6ff5c" stop-opacity="0.35"/>
  <stop offset="100%" stop-color="#b6ff5c" stop-opacity="0"/>
</linearGradient></defs>`;

function sparkline(values, opts={}){
  const w=1000, h=opts.h||180, pad=28;
  const nums=values.map(v=>v===null||v===undefined?null:+v);
  const valid=nums.filter(v=>v!==null);
  if(!valid.length) return '<div class="no-data">no data yet</div>';
  const max=Math.max(...valid)*1.1||1, min=0;
  const stepX=(w-pad*2)/Math.max(nums.length-1,1);
  const pts=nums.map((v,i)=>{
    if(v===null)return null;
    return [pad+i*stepX, h-pad-((v-min)/(max-min||1))*(h-pad*2)];
  });
  const vp=pts.filter(Boolean);
  const pathD=vp.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const areaD=pathD+` L ${vp[vp.length-1][0].toFixed(1)} ${h-pad} L ${vp[0][0].toFixed(1)} ${h-pad} Z`;
  const grid=[0,.25,.5,.75,1].map(f=>`<line class="gridline" x1="${pad}" y1="${(pad+f*(h-pad*2)).toFixed(1)}" x2="${w-pad}" y2="${(pad+f*(h-pad*2)).toFixed(1)}"/>`).join('');
  const dots=pts.map(p=>p?`<circle class="pt" r="3.5" cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}"/>`:'').join('');
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${GRAD}${grid}<path class="series-area" d="${areaD}"/><path class="series-line" d="${pathD}"/>${dots}</svg>`;
}

function sparklineDual(v1,v2,opts={}){
  const w=1000,h=opts.h||180,pad=28;
  const all=[...v1,...v2].filter(v=>v!==null&&v!==undefined);
  if(!all.length) return '<div class="no-data">no data yet</div>';
  const max=Math.max(...all)*1.1||1, min=Math.min(...all)*0.92;
  const stepX=(w-pad*2)/Math.max(v1.length-1,1);
  function pts(vals){return vals.map((v,i)=>v===null||v===undefined?null:[pad+i*stepX,h-pad-((v-min)/(max-min||1))*(h-pad*2)]);}
  function path(ps){const vp=ps.filter(Boolean);return vp.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');}
  const grid=[0,.25,.5,.75,1].map(f=>`<line class="gridline" x1="${pad}" y1="${(pad+f*(h-pad*2)).toFixed(1)}" x2="${w-pad}" y2="${(pad+f*(h-pad*2)).toFixed(1)}"/>`).join('');
  const p1=pts(v1),p2=pts(v2);
  const d1=pts(v1).map(p=>p?`<circle fill="var(--accent)" r="3" cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}"/>`:'').join('');
  const d2=pts(v2).map(p=>p?`<circle fill="var(--red)" r="3" cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}"/>`:'').join('');
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${grid}
    <path fill="none" stroke="var(--accent)" stroke-width="2.5" d="${path(p1)}"/>
    <path fill="none" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="6 3" d="${path(p2)}"/>
    ${d1}${d2}</svg>
  <div style="font-family:var(--mono);font-size:10px;color:var(--ink-dim);margin-top:8px;">
    <span style="color:var(--accent)">●</span> ${opts.l1||'A'} &nbsp;
    <span style="color:var(--red)">- -</span> ${opts.l2||'B'}
  </div>`;
}

function barChart(labels, values, opts={}){
  const w=1000,h=opts.h||200,pad=32;
  const valid=values.filter(v=>v!==null&&v!==undefined);
  if(!valid.length) return '<div class="no-data">no data yet</div>';
  const max=Math.max(...valid)*1.15||1;
  const slot=(w-pad*2)/values.length;
  const barW=Math.min(slot*0.6,52);
  const grid=[0,.25,.5,.75,1].map(f=>`<line class="gridline" x1="${pad}" y1="${(pad+f*(h-pad*2-20)).toFixed(1)}" x2="${w-pad}" y2="${(pad+f*(h-pad*2-20)).toFixed(1)}"/>`).join('');
  const bars=values.map((v,i)=>{
    const cx=pad+slot*i+slot/2;
    if(v===null||v===undefined)return'';
    const bh=(v/max)*(h-pad*2-20);
    const y=(h-pad-20)-bh;
    return `<rect class="bar" x="${(cx-barW/2).toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${bh.toFixed(1)}" rx="2"/>
      <text class="bar-value" x="${cx.toFixed(1)}" y="${(y-5).toFixed(1)}">${v.toFixed(1)}</text>
      <text class="bar-label" x="${cx.toFixed(1)}" y="${h-pad+12}">${labels[i]}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${grid}${bars}</svg>`;
}

function stackedBarChart(labels, series, colors, opts={}){
  // series: array of {name, values[]}
  const w=1000,h=opts.h||200,pad=32;
  const totals=labels.map((_,i)=>series.reduce((s,sr)=>s+(sr.values[i]||0),0));
  const max=Math.max(...totals)*1.15||1;
  const slot=(w-pad*2)/labels.length;
  const barW=Math.min(slot*0.6,52);
  const grid=[0,.25,.5,.75,1].map(f=>`<line class="gridline" x1="${pad}" y1="${(pad+f*(h-pad*2-20)).toFixed(1)}" x2="${w-pad}" y2="${(pad+f*(h-pad*2-20)).toFixed(1)}"/>`).join('');
  const bars=labels.map((_,i)=>{
    const cx=pad+slot*i+slot/2;
    let y=h-pad-20; let out='';
    series.forEach((sr,si)=>{
      const v=sr.values[i]||0;
      if(!v)return;
      const bh=(v/max)*(h-pad*2-20);
      y-=bh;
      out+=`<rect fill="${colors[si]}" opacity="0.85" x="${(cx-barW/2).toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${bh.toFixed(1)}" rx="1"/>`;
    });
    return out+`<text class="bar-label" x="${cx.toFixed(1)}" y="${h-pad+12}">${labels[i]}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${grid}${bars}</svg>`;
}

// ── data helpers ──────────────────────────────────────────────
function isoWeekInfo(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const dayNr=(d.getDay()+6)%7;
  const t=new Date(d);t.setDate(d.getDate()-dayNr+3);
  const ft=t.valueOf();t.setMonth(0,1);
  if(t.getDay()!==4)t.setMonth(0,1+((4-t.getDay())+7)%7);
  const wk=1+Math.round((ft-t.valueOf())/(7*24*3600*1000));
  const mon=new Date(d);mon.setDate(d.getDate()-dayNr);
  return{key:`${d.getFullYear()}-W${String(wk).padStart(2,'0')}`,label:mon.toLocaleDateString('en-US',{month:'short',day:'numeric'}),monday:mon};
}

function rollingAvg(arr,field,w){
  return arr.map((r,i)=>{
    const sl=arr.slice(Math.max(0,i-w+1),i+1).map(x=>x[field]).filter(v=>v!=null);
    return sl.length?sl.reduce((s,v)=>s+v,0)/sl.length:null;
  });
}

function computeACWR(rows){
  return rows.slice(27).map((_,idx)=>{
    const i=idx+27;
    const a7=rows.slice(i-6,i+1).map(r=>r.distance_km||0);
    const c28=rows.slice(i-27,i+1).map(r=>r.distance_km||0);
    const aAvg=a7.reduce((s,v)=>s+v,0)/7;
    const cAvg=c28.reduce((s,v)=>s+v,0)/28;
    return{date:rows[i].date,ratio:cAvg>0?Math.round(aAvg/cAvg*100)/100:null};
  });
}

function hrZone(hr,maxHr){
  const pct=hr/maxHr;
  if(pct<0.6)return 0;if(pct<0.7)return 1;if(pct<0.8)return 2;if(pct<0.9)return 3;return 4;
}

function weeklyRunningStats(activities,maxHr){
  const weeks={};
  for(const a of activities){
    if(!a.type||!a.type.toLowerCase().includes('run'))continue;
    if(!a.start_local)continue;
    const dt=a.start_local.split('T')[0].split(' ')[0];
    const{key,label,monday}=isoWeekInfo(dt);
    if(!weeks[key])weeks[key]={label,monday,dist:0,longest:0,elev:0,maxHr:null,paces:[],count:0,zoneMins:[0,0,0,0,0]};
    const w=weeks[key];
    if(a.distance_km){w.dist+=a.distance_km;w.longest=Math.max(w.longest,a.distance_km);}
    if(a.max_hr)w.maxHr=w.maxHr===null?a.max_hr:Math.max(w.maxHr,a.max_hr);
    if(a.pace_min_per_km)w.paces.push(a.pace_min_per_km);
    if(a.elevation_gain_m)w.elev+=a.elevation_gain_m;
    if(a.avg_hr&&a.duration_seconds){
      const z=hrZone(a.avg_hr,maxHr);
      w.zoneMins[z]+=Math.round(a.duration_seconds/60);
    }
    w.count++;
  }
  return Object.entries(weeks).sort((a,b)=>b[1].monday-a[1].monday)
    .map(([,w])=>({...w,avgPace:w.paces.length?w.paces.reduce((s,p)=>s+p,0)/w.paces.length:null}));
}

// Weekly mileage from logged RUNNING ACTIVITIES only (not Garmin's
// daily-summary distance, which includes incidental walking/steps).
function weeklyRunningMileageAgg(activities){
  const weeks={};
  for(const a of activities){
    if(!a.type||!a.type.toLowerCase().includes('run'))continue;
    if(!a.start_local)continue;
    if(a.distance_km==null)continue;
    const dt=a.start_local.split('T')[0].split(' ')[0];
    const{key,label,monday}=isoWeekInfo(dt);
    if(!weeks[key])weeks[key]={label,monday,total:0};
    weeks[key].total+=a.distance_km;
  }
  return Object.entries(weeks).sort((a,b)=>a[1].monday-b[1].monday).map(([,w])=>w);
}

function monthlyStats(rows){
  const months={};
  for(const r of rows){
    const m=r.date.slice(0,7);
    if(!months[m])months[m]={month:m,dist:0,steps:0,rhrSum:0,rhrCount:0,days:0};
    const mo=months[m];
    if(r.distance_km)mo.dist+=r.distance_km;
    if(r.steps)mo.steps+=r.steps;
    if(r.resting_hr){mo.rhrSum+=r.resting_hr;mo.rhrCount++;}
    mo.days++;
  }
  return Object.values(months).sort((a,b)=>b.month.localeCompare(a.month));
}

function paceHrSeries(activities){
  return activities
    .filter(a=>a.type&&a.type.toLowerCase().includes('run')&&a.avg_hr&&a.pace_min_per_km&&a.distance_km>1)
    .slice(0,60).reverse();
}

function formatPace(m){if(!m)return'—';const mn=Math.floor(m);return`${mn}:${String(Math.round((m-mn)*60)).padStart(2,'0')}/${distLabel()}`;}
function formatDur(s){if(!s)return'—';const h=Math.floor(s/3600),m=Math.round((s%3600)/60);return h?`${h}h ${m}m`:`${m}m`;}
function fmt(v,unit=''){return(v===null||v===undefined)?'—':`${Math.round(v).toLocaleString()}${unit?` <span>${unit}</span>`:''}`;}
function fmtDelta(a,b){
  if(a==null||b==null)return'';
  const d=a-b;if(!d)return'';
  return`<div class="delta ${d>0?'up':'down'}">${d>0?'+':''}${Math.round(d).toLocaleString()} vs prior day</div>`;
}

// personal records
function computePRs(activities){
  const runs=activities.filter(a=>a.type&&a.type.toLowerCase().includes('run')&&a.distance_km>0);
  const prs={longest:null,fastest5k:null,fastest10k:null,fastestHalf:null,fastestMarathon:null};
  for(const a of runs){
    const d=a.distance_km,p=a.pace_min_per_km,dur=a.duration_seconds;
    if(!prs.longest||d>prs.longest.dist)prs.longest={dist:d,date:a.start_local?.slice(0,10),name:a.name};
    if(d>=4.8&&d<=5.2&&(!prs.fastest5k||p<prs.fastest5k.pace))prs.fastest5k={pace:p,dur,date:a.start_local?.slice(0,10)};
    if(d>=9.5&&d<=10.5&&(!prs.fastest10k||p<prs.fastest10k.pace))prs.fastest10k={pace:p,dur,date:a.start_local?.slice(0,10)};
    if(d>=20.5&&d<=22.5&&(!prs.fastestHalf||p<prs.fastestHalf.pace))prs.fastestHalf={pace:p,dur,date:a.start_local?.slice(0,10)};
    if(d>=41&&d<=43&&(!prs.fastestMarathon||p<prs.fastestMarathon.pace))prs.fastestMarathon={pace:p,dur,date:a.start_local?.slice(0,10)};
  }
  return prs;
}

// injury risk score 0-100
function injuryRisk(acwrData,rows){
  const latest=acwrData.length?acwrData[acwrData.length-1]:null;
  const acwr=latest?.ratio??null;
  // RHR deviation: compare last 3 days vs 14-day avg
  const rhrRows=rows.filter(r=>r.resting_hr!=null);
  let rhrDev=0;
  if(rhrRows.length>=5){
    const recent=rhrRows.slice(-3).map(r=>r.resting_hr);
    const base=rhrRows.slice(-14,-3).map(r=>r.resting_hr);
    if(base.length){
      const baseAvg=base.reduce((s,v)=>s+v,0)/base.length;
      const recentAvg=recent.reduce((s,v)=>s+v,0)/recent.length;
      rhrDev=recentAvg-baseAvg;
    }
  }
  // Body battery: low avg = poor recovery
  const bbRows=rows.filter(r=>r.body_battery_charged!=null).slice(-7);
  const bbAvg=bbRows.length?bbRows.reduce((s,r)=>s+r.body_battery_charged,0)/bbRows.length:null;

  let score=0,reasons=[];
  if(acwr!==null){
    if(acwr>1.5){score+=40;reasons.push(`High training load (ACWR ${acwr})`)}
    else if(acwr>1.3){score+=20;reasons.push(`Elevated training load (ACWR ${acwr})`)}
    else if(acwr<0.6){score+=10;reasons.push('Significant deload — watch for re-injury on ramp-up')}
  }
  if(rhrDev>4){score+=30;reasons.push(`RHR elevated +${rhrDev.toFixed(1)} bpm vs 14-day avg`)}
  else if(rhrDev>2){score+=15;reasons.push(`RHR slightly elevated +${rhrDev.toFixed(1)} bpm`)}
  if(bbAvg!==null&&bbAvg<40){score+=20;reasons.push(`Low body battery avg (${bbAvg.toFixed(0)})`)}
  else if(bbAvg!==null&&bbAvg<55){score+=10;reasons.push(`Moderate body battery avg (${bbAvg.toFixed(0)})`)}

  const level=score>=50?'high':score>=25?'caution':'ok';
  const label=score>=50?'HIGH RISK':score>=25?'CAUTION':'LOW RISK';
  return{score:Math.min(score,100),level,label,reasons};
}

              ${r}
            </div>`).join(''):`<div style="font-family:var(--mono);font-size:12px;color:var(--accent)">✓ All indicators nominal — good to train</div>`}
          <div style="font-family:var(--mono);font-size:10px;color:var(--ink-dim);margin-top:12px;">Based on ACWR, RHR deviation vs 14-day baseline, and body battery average.</div>
        </div>
      </div>
    </div>
  </div>

  <div id="tab-records" class="tab-content">
    <div class="grid-3">
      <div class="stat">
        <div class="label">Longest Run</div>
        <div class="value" style="font-size:28px">${prs.longest?distFmt(prs.longest.dist):'—'}</div>
        ${prs.longest?`<div class="delta">${prs.longest.date||''} · ${prs.longest.name||''}</div>`:''}
      </div>
      <div class="stat">
        <div class="label">Fastest 5K Pace</div>
        <div class="value" style="font-size:28px">${prs.fastest5k?paceDisplay(prs.fastest5k.pace):'—'}</div>
        ${prs.fastest5k?`<div class="delta">${prs.fastest5k.date} · ${formatDur(prs.fastest5k.dur)}</div>`:''}
      </div>
      <div class="stat">
        <div class="label">Fastest 10K Pace</div>
        <div class="value" style="font-size:28px">${prs.fastest10k?paceDisplay(prs.fastest10k.pace):'—'}</div>
        ${prs.fastest10k?`<div class="delta">${prs.fastest10k.date} · ${formatDur(prs.fastest10k.dur)}</div>`:''}
      </div>
      <div class="stat">
        <div class="label">Fastest Half Marathon</div>
        <div class="value" style="font-size:28px">${prs.fastestHalf?paceDisplay(prs.fastestHalf.pace):'—'}</div>
        ${prs.fastestHalf?`<div class="delta">${prs.fastestHalf.date} · ${formatDur(prs.fastestHalf.dur)}</div>`:''}
      </div>
      <div class="stat">
        <div class="label">Fastest Marathon</div>
        <div class="value" style="font-size:28px">${prs.fastestMarathon?paceDisplay(prs.fastestMarathon.pace):'—'}</div>
        ${prs.fastestMarathon?`<div class="delta">${prs.fastestMarathon.date} · ${formatDur(prs.fastestMarathon.dur)}</div>`:''}
      </div>
      <div class="stat">
        <div class="label">Activities Tracked</div>
        <div class="value">${activities.length.toLocaleString()}</div>
        <div class="delta">${rows.length.toLocaleString()} days of data</div>
      </div>
    </div>

    <div class="panel">
      <h2>All-Time Monthly Distance (${distLabel()})</h2>
      ${monthly.length?barChart(monthly.slice(0,24).reverse().map(m=>m.month.slice(5)),monthly.slice(0,24).reverse().map(m=>distVal(m.dist)),{h:240}):'<div class="no-data">no data yet</div>'}
    </div>

    <div class="panel">
      <h2>Best Weeks by Distance <span class="range">all time, running only</span></h2>
      ${(()=>{
        const sorted=[...weeklyRunningMileageAgg(activities)].sort((a,b)=>b.total-a.total).slice(0,10);
        return sorted.length?`<table>
          <thead><tr><th>Week of</th><th>Distance</th></tr></thead>
          <tbody>${sorted.map(w=>`<tr><td>${w.label}</td><td>${distFmt(w.total)}</td></tr>`).join('')}</tbody>
        </table>`:'<div class="no-data">no data yet</div>';
      })()}
    </div>
  </div>`;

  // keep tab visible after re-render
  const activeTab=document.querySelector('.tab.active');
  if(activeTab){
    const idx=[...document.querySelectorAll('.tab')].indexOf(activeTab);
    const names=['overview','training','health','records'];
    if(idx>=0)switchTab(names[idx]);
  }
}

// ── boot ─────────────────────────────────────────────────────
async function main(){
  loadTheme();
  const statusEl=document.getElementById('statusLine');
  let raw,actRaw;
  try{
    const[h,a]=await Promise.all([
      fetch('./data/history.json',{cache:'no-store'}),
      fetch('./data/activities.json',{cache:'no-store'}).catch(()=>null),
    ]);
    raw=await h.json();
    actRaw=a?await a.json().catch(()=>({})):{};
  }catch(e){
    statusEl.innerHTML='<span class="dot" style="background:var(--red)"></span>failed to load data';
    return;
  }
  const days=Object.keys(raw).sort();
  if(!days.length){statusEl.innerHTML='<span class="dot"></span>no data yet';return;}
  globalRows=days.map(d=>raw[d]);
  globalActivities=Object.values(actRaw||{}).sort((a,b)=>(b.start_local||'').localeCompare(a.start_local||''));
  statusEl.innerHTML=`<span class="dot"></span>last synced ${globalRows[globalRows.length-1].date}`;
  render();
}
main();
</script>
</body>
</html>
